<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Math Crunch">
  <meta name="theme-color" content="#1a1a2e">
  <title>Cosmic Math Crunch</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* Dynamic viewport height for mobile */
      background: #12121f;
      overflow: hidden;
      touch-action: none;
      -webkit-overflow-scrolling: touch;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      /* Extend into iOS safe-area (notch / home indicator) so the canvas fills
         the whole screen instead of leaving a status-bar-height gap. */
      height: 100vh;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
    }
    /* When installed as a PWA, ignore safe-area padding and let the canvas
       fill edge-to-edge — Phaser scales it to fit and centers it itself, so
       any inset at the top reads as a blank band. */
    @media (display-mode: standalone) {
      body {
        padding: 0;
      }
    }
    #game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      max-height: 100dvh;
      /* Ensure perfect centering on desktop */
      margin: 0 auto;
      position: relative;
    }
    #game-container canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      /* Force center alignment */
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
